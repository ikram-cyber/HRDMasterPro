<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRD Master Pro - Versi Utuh</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e40af; --success: #10b981; --danger: #ef4444; --warn: #f59e0b; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 80px; font-size: 13px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; border: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .page { display: none; } .active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { border: none; background: none; font-size: 11px; color: #666; display: flex; flex-direction: column; align-items: center; width: 20%; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="p-home" class="page active">
    <div class="card" style="background:var(--primary); color:white;">
        <h2 id="pt-name" style="margin:0;">HRD MASTER PRO</h2>
        <p id="tgl-skrg" style="margin:5px 0 0 0; opacity:0.8;"></p>
    </div>
    <div class="grid">
        <div class="card" style="text-align:center;"><h3>Karyawan</h3><h1 id="count-k">0</h1></div>
        <div class="card" style="text-align:center;"><h3>Hadir Hari Ini</h3><h1 id="count-h">0</h1></div>
    </div>
</div>

<div id="p-karyawan" class="page">
    <div class="card">
        <h3>Tambah/Edit Data Utuh</h3>
        <input type="text" id="k-id" placeholder="ID/NIK">
        <input type="text" id="k-nama" placeholder="Nama Lengkap">
        <input type="text" id="k-jabatan" placeholder="Jabatan">
        <div class="grid">
            <div><label>Gaji Pokok</label><input type="number" id="k-gp" value="0"></div>
            <div><label>Uang Makan</label><input type="number" id="k-um" value="0"></div>
            <div><label>Uang Transport</label><input type="number" id="k-ut" value="0"></div>
            <div><label>Lembur/Jam</label><input type="number" id="k-ul" value="0"></div>
        </div>
        <button class="btn-main" onclick="simpanKaryawan()">💾 SIMPAN DATA KARYAWAN</button>
    </div>
    <div class="card"><h3>Daftar Pegawai</h3><div id="list-k"></div></div>
</div>

<div id="p-absen" class="page">
    <div class="card">
        <h3>Input Absensi & Lembur</h3>
        <label>Tanggal</label>
        <input type="date" id="a-tgl">
        <label>Pilih Karyawan</label>
        <select id="a-kar"></select>
        <div class="grid">
            <select id="a-stat">
                <option value="HADIR">HADIR</option>
                <option value="SAKIT">SAKIT</option>
                <option value="IZIN">IZIN</option>
                <option value="ALPA">ALPA</option>
            </select>
            <input type="number" id="a-lembur" placeholder="Jam Lembur" value="0">
        </div>
        <button class="btn-main" onclick="simpanAbsen()">⚡ CATAT KEHADIRAN</button>
    </div>
    <div class="card"><h3>Riwayat Absen</h3><div id="list-a"></div></div>
</div>

<div id="p-slip" class="page">
    <div class="card no-print">
        <h3>Laporan & Slip Gaji</h3>
        <input type="month" id="s-bln">
        <select id="s-kar"></select>
        <button class="btn-main" onclick="buatSlip()">💰 GENERATE SLIP GAJI</button>
    </div>
    <div id="slip-area" class="card" style="display:none;"></div>
</div>

<div class="bottom-nav no-print">
    <button class="nav-item active" onclick="buka('home')">📊<br>Dash</button>
    <button class="nav-item" onclick="buka('karyawan')">👥<br>Pegawai</button>
    <button class="nav-item" onclick="buka('absen')">📝<br>Absen</button>
    <button class="nav-item" onclick="buka('slip')">💰<br>Slip</button>
</div>

<script>
    // DATA MENGGUNAKAN KUNCI LAMA AGAR TIDAK HILANG
    let db_k = JSON.parse(localStorage.getItem('hr_kar')) || [];
    let db_a = JSON.parse(localStorage.getItem('hr_absen')) || [];
    
    // KUNCI TANGGAL (MAKSIMAL HARI INI)
    let tgl_obj = new Date();
    let hariIni = new Date(tgl_obj.getTime() - (tgl_obj.getTimezoneOffset() * 60000)).toISOString().slice(0,10);
    document.getElementById('a-tgl').value = hariIni;
    document.getElementById('a-tgl').setAttribute('max', hariIni);
    document.getElementById('tgl-skrg').innerText = tgl_obj.toDateString();

    function simpanKaryawan() {
        let id = document.getElementById('k-id').value;
        if(!id) return alert("ID Wajib isi!");
        let k = {
            id: id,
            nama: document.getElementById('k-nama').value,
            jabatan: document.getElementById('k-jabatan').value,
            gp: parseInt(document.getElementById('k-gp').value) || 0,
            um: parseInt(document.getElementById('k-um').value) || 0,
            ut: parseInt(document.getElementById('k-ut').value) || 0,
            ul: parseInt(document.getElementById('k-ul').value) || 0
        };
        let idx = db_k.findIndex(x => x.id === id);
        if(idx > -1) db_k[idx] = k; else db_k.push(k);
        localStorage.setItem('hr_kar', JSON.stringify(db_k));
        location.reload();
    }

    function simpanAbsen() {
        let tgl = document.getElementById('a-tgl').value;
        let id = document.getElementById('a-kar').value;
        if(!id) return alert("Pilih Karyawan!");
        db_a.push({
            tgl: tgl, 
            id: id, 
            stat: document.getElementById('a-stat').value, 
            lbr: parseInt(document.getElementById('a-lembur').value) || 0
        });
        localStorage.setItem('hr_absen', JSON.stringify(db_a));
        alert("Absen Tersimpan!"); render();
    }

    function buatSlip() {
        let id = document.getElementById('s-kar').value;
        let bln = document.getElementById('s-bln').value;
        let k = db_k.find(x => x.id === id);
        let abs = db_a.filter(x => x.id === id && x.tgl.startsWith(bln));
        
        let h = abs.filter(x => x.stat === "HADIR").length;
        let tl = abs.reduce((s, x) => s + x.lbr, 0);
        
        let t_gp = h * k.gp;
        let t_um = h * k.um;
        let t_ut = h * k.ut;
        let t_ul = tl * k.ul;
        let total = t_gp + t_um + t_ut + t_ul;

        document.getElementById('slip-area').innerHTML = `
            <div style="text-align:center; border-bottom:1px solid #000;">
                <h3>SLIP GAJI PEGAWAI</h3>
                <p>${bln}</p>
            </div>
            <p>Nama: <b>${k.nama}</b> (${k.jabatan})</p>
            <table border="0" style="width:100%">
                <tr><td>Gaji Pokok (${h}x)</td><td align="right">Rp ${t_gp.toLocaleString()}</td></tr>
                <tr><td>Uang Makan (${h}x)</td><td align="right">Rp ${t_um.toLocaleString()}</td></tr>
                <tr><td>Uang Transport (${h}x)</td><td align="right">Rp ${t_ut.toLocaleString()}</td></tr>
                <tr><td>Lembur (${tl} Jam)</td><td align="right">Rp ${t_ul.toLocaleString()}</td></tr>
                <tr style="font-weight:bold; border-top:1px solid #000;">
                    <td>TOTAL DITERIMA</td><td align="right">Rp ${total.toLocaleString()}</td>
                </tr>
            </table><br>
            <button class="btn-main no-print" onclick="window.print()">PRINT SLIP</button>
        `;
        document.getElementById('slip-area').style.display = 'block';
    }

    function render() {
        document.getElementById('count-k').innerText = db_k.length;
        document.getElementById('count-h').innerText = db_a.filter(x => x.tgl === hariIni && x.stat === "HADIR").length;
        
        let listK = "<table><tr><th>ID</th><th>Nama</th><th>Gaji/H</th></tr>";
        let opt = "<option value=''>-- Pilih --</option>";
        db_k.forEach(x => {
            let totalHarian = x.gp + x.um + x.ut;
            listK += `<tr><td>${x.id}</td><td>${x.nama}</td><td>${totalHarian.toLocaleString()}</td></tr>`;
            opt += `<option value="${x.id}">${x.nama}</option>`;
        });
        document.getElementById('list-k').innerHTML = listK + "</table>";
        document.getElementById('a-kar').innerHTML = opt;
        document.getElementById('s-kar').innerHTML = opt;

        let listA = "<table><tr><th>Tgl</th><th>Nama</th><th>Stat</th></tr>";
        db_a.slice(-10).reverse().forEach(x => {
            let k = db_k.find(y => y.id === x.id);
            listA += `<tr><td>${x.tgl}</td><td>${k?k.nama:'?'}</td><td>${x.stat}</td></tr>`;
        });
        document.getElementById('list-a').innerHTML = listA + "</table>";
    }

    function buka(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    render();
</script>
</body>
</html>
