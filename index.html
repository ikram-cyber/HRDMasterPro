<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRD Master Pro - ORIGINAL LAYOUT</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e40af; --success: #10b981; --danger: #ef4444; --warn: #f59e0b; --bg: #f3f4f6; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 80px; font-size: 12px; }
        .card { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #000; }
        h3 { margin: 0 0 10px 0; color: #000; border-bottom: 1px solid #000; padding-bottom: 5px; font-size: 14px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 4px; border: 1px solid #000; box-sizing: border-box; font-family: inherit; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-main { background: #000; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: #fff; color: #000; border: 2px solid #000; font-weight: bold; }
        .btn-danger { background: #fff; color: #000; border: 1px solid #000; font-size: 10px; width: auto; padding: 2px 5px; }
        .page { display: none; } .active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #000; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 10px; color: #000; display: flex; flex-direction: column; align-items: center; width: 20%; cursor: pointer; }
        .nav-item.active { font-weight: bold; text-decoration: underline; }
        
        /* SLIP LAYOUT */
        .slip-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid #000; }
        .slip-table td { border: 1px solid #000; padding: 5px; vertical-align: top; }
        .header-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .ttd-container { display: flex; justify-content: space-between; margin-top: 30px; text-align: center; }
        .ttd-box { width: 150px; }
        @media print { .no-print { display: none !important; } .card { border: 1px solid #000; box-shadow: none; } }
    </style>
</head>
<body>

<div id="p-home" class="page active">
    <div class="card">
        <h2 id="v-pt" style="margin:0; text-align:center;">PT KELAPA</h2>
        <p id="v-tgl" style="margin:5px 0 0 0; text-align:center;"></p>
    </div>
    <div class="grid">
        <div class="card" style="text-align:center;"><h3>Pegawai</h3><h1 id="t-k">0</h1></div>
        <div class="card" style="text-align:center;"><h3>Hadir</h3><h1 id="t-h">0</h1></div>
    </div>
</div>

<div id="p-kar" class="page">
    <div class="card">
        <h3 id="f-title">INPUT PEGAWAI</h3>
        <input type="text" id="k-id" placeholder="NIK">
        <input type="text" id="k-nm" placeholder="NAMA">
        <input type="text" id="k-jb" placeholder="JABATAN">
        <div class="grid">
            <div><label>GAJI POKOK</label><input type="number" id="k-gp" value="0"></div>
            <div><label>TUNJ. TETAP</label><input type="number" id="k-um" value="0"></div>
            <div><label>BPJS (POT)</label><input type="number" id="k-ut" value="5000"></div>
            <div><label>LEMBUR/JAM</label><input type="number" id="k-ul" value="0"></div>
        </div>
        <button class="btn-main" onclick="saveK()">SIMPAN</button>
    </div>
    <div class="card"><h3>LIST</h3><div id="list-k"></div></div>
</div>

<div id="p-abs" class="page">
    <div class="card">
        <h3>ABSENSI</h3>
        <input type="date" id="a-tgl">
        <select id="a-sel"></select>
        <div class="grid">
            <select id="a-st"><option value="HADIR">HADIR</option><option value="SAKIT">SAKIT</option><option value="IZIN">IZIN</option><option value="ALPA">ALPA</option></select>
            <input type="number" id="a-lb" value="0" placeholder="Lembur">
        </div>
        <button class="btn-main" onclick="saveA()">CATAT</button>
    </div>
    <div class="card" id="list-a"></div>
</div>

<div id="p-pay" class="page">
    <div class="card no-print">
        <h3>GENERATE SLIP</h3>
        <input type="month" id="p-bln">
        <select id="p-sel"></select>
        <button class="btn-success" onclick="getSlip()">LIHAT SLIP</button>
    </div>
    <div id="v-slip" class="card" style="display:none;"></div>
</div>

<div id="p-set" class="page">
    <div class="card">
        <h3>SETTING</h3>
        <input type="text" id="s-pt" placeholder="Nama PT">
        <button class="btn-main" onclick="saveS()">UPDATE</button>
        <button class="btn-danger" style="width:100%" onclick="resetAll()">RESET TOTAL</button>
    </div>
</div>

<nav class="bottom-nav no-print">
    <div class="nav-item active" onclick="buka('home')">HOME</div>
    <div class="nav-item" onclick="buka('kar')">PEGAWAI</div>
    <div class="nav-item" onclick="buka('abs')">ABSEN</div>
    <div class="nav-item" onclick="buka('pay')">GAJI</div>
    <div class="nav-item" onclick="buka('set')">SET</div>
</nav>

<script>
    let db_k = JSON.parse(localStorage.getItem('hr_kar')) || [];
    let db_a = JSON.parse(localStorage.getItem('hr_absen')) || [];
    let PT = localStorage.getItem('hr_pt') || "PT KELAPA";

    let n = new Date();
    let hariIni = new Date(n.getTime() - (n.getTimezoneOffset() * 60000)).toISOString().slice(0,10);
    document.getElementById('a-tgl').value = hariIni;
    document.getElementById('a-tgl').setAttribute('max', hariIni);
    document.getElementById('p-bln').value = hariIni.slice(0,7);

    function saveS() { localStorage.setItem('hr_pt', document.getElementById('s-pt').value); location.reload(); }
    function saveK() {
        let id = document.getElementById('k-id').value;
        let d = { id:id, nm:document.getElementById('k-nm').value, jb:document.getElementById('k-jb').value, gp:parseInt(document.getElementById('k-gp').value)||0, um:parseInt(document.getElementById('k-um').value)||0, ut:parseInt(document.getElementById('k-ut').value)||0, ul:parseInt(document.getElementById('k-ul').value)||0 };
        let i = db_k.findIndex(x => x.id === id); if(i > -1) db_k[i] = d; else db_k.push(d);
        localStorage.setItem('hr_kar', JSON.stringify(db_k)); render(); alert("OK!");
    }
    function saveA() {
        let id = document.getElementById('a-sel').value; let tgl = document.getElementById('a-tgl').value;
        db_a = db_a.filter(x => !(x.tgl === tgl && x.id === id));
        db_a.push({ tgl:tgl, id:id, st:document.getElementById('a-st').value, lb:parseInt(document.getElementById('a-lb').value)||0 });
        localStorage.setItem('hr_absen', JSON.stringify(db_a)); render();
    }

    function getSlip() {
        let id = document.getElementById('p-sel').value; let bln = document.getElementById('p-bln').value;
        if(!id) return;
        let k = db_k.find(x => x.id === id); let abs = db_a.filter(x => x.id === id && x.tgl.startsWith(bln));
        let h = abs.filter(x => x.st === "HADIR").length; let jam = abs.reduce((s, x) => s + x.lb, 0);
        let gp = k.gp, tunj = k.um, lemb = jam*k.ul, pot = k.ut;
        let totP = gp + tunj + lemb; let thp = totP - pot;

        document.getElementById('v-slip').innerHTML = `
            <div style="text-align:center; border-bottom:1px solid #000; margin-bottom:10px;">
                <h2 style="margin:0">${PT}</h2>
                <p style="margin:2px 0; font-size:10px;">SLIP GAJI KARYAWAN | Periode: ${bln}</p>
            </div>
            <div class="header-info">
                <div>NIK / Nama : ${k.id} - ${k.nm}</div>
                <div>Dept/Jabatan : ${k.jb}</div>
            </div>
            <table class="slip-table">
                <tr style="font-weight:bold; background:#f0f0f0;">
                    <td>PENDAPATAN</td>
                    <td>POTONGAN</td>
                </tr>
                <tr>
                    <td>
                        Gaji Pokok: Rp ${gp.toLocaleString()}<br>
                        Tunj. Tetap: Rp ${tunj.toLocaleString()}<br>
                        Uang Lembur: Rp ${lemb.toLocaleString()}<br><br>
                        <b>Total Pendapatan: Rp ${totP.toLocaleString()}</b>
                    </td>
                    <td>
                        BPJS Kes/TK: Rp ${pot.toLocaleString()}<br>
                        Pot. Telat/Alpa: Rp 0<br><br><br>
                        <b>Total Potongan: Rp ${pot.toLocaleString()}</b>
                    </td>
                </tr>
            </table>
            <div style="border:2px solid #000; margin-top:10px; padding:8px; text-align:center; font-weight:bold;">
                TAKE HOME PAY : Rp ${thp.toLocaleString()}
            </div>
            <div class="ttd-container">
                <div class="ttd-box">
                    Penerima,<br><br><br><br>
                    ( ${k.nm} )
                </div>
                <div class="ttd-box">
                    HRD & Finance,<br><br><br><br>
                    ( <u>${PT}</u> )
                </div>
            </div>
            <button class="btn-main no-print" onclick="window.print()" style="margin-top:20px;">PRINT PDF</button>
        `;
        document.getElementById('v-slip').style.display = 'block';
    }

    function render() {
        document.getElementById('v-pt').innerText = PT;
        document.getElementById('t-k').innerText = db_k.length;
        document.getElementById('t-h').innerText = db_a.filter(x => x.tgl === hariIni && x.st === "HADIR").length;
        let lk = "<table>"; let opt = "<option value=''>-- Pilih --</option>";
        db_k.forEach(x => { 
            lk += `<tr><td>${x.nm}</td><td align="right"><button onclick="delK('${x.id}')">🗑️</button></td></tr>`;
            opt += `<option value="${x.id}">${x.nm}</option>`;
        });
        document.getElementById('list-k').innerHTML = lk + "</table>";
        document.getElementById('a-sel').innerHTML = opt; document.getElementById('p-sel').innerHTML = opt;
    }
    function buka(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); }
    function delK(id) { if(confirm("Hapus?")) { db_k = db_k.filter(x => x.id !== id); localStorage.setItem('hr_kar', JSON.stringify(db_k)); render(); } }
    function resetAll() { if(confirm("Reset semua?")) { localStorage.clear(); location.reload(); } }
    render();
</script>
</body>
</html>
